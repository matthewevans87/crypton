services:
  agent-runner:
    image: crypton-agent-runner:latest
    build:
      context: .
      dockerfile: src/Crypton.Api.AgentRunner/Dockerfile
    container_name: crypton-agent-runner
    ports:
      - "127.0.0.1:5003:5003"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:5003
      - AGENTRUNNER__TOOLS__BRAVESEARCH__APIKEY=${AGENTRUNNER__TOOLS__BRAVESEARCH__APIKEY}
      - AGENTRUNNER__API__APIKEY=${AGENTRUNNER__API__APIKEY}
      - AGENTRUNNER__TOOLS__MARKETDATASERVICE__BASEURL=http://market-data-service:5002
      - AGENTRUNNER__TOOLS__EXECUTIONSERVICE__BASEURL=http://execution-service:5004
      - AGENTRUNNER__OLLAMA__BASEURL=http://host-gateway:11434
      - AGENTRUNNER__TOOLS__BIRD__BASEURL=http://host-gateway:11435
    extra_hosts:
      - "host-gateway:host-gateway"
    volumes:
      - crypton_artifacts:/app/artifacts
      - /home/matthew-evans/.config/crypton/logs:/app/logs
    depends_on:
      market-data-service:
        condition: service_healthy
      execution-service:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  market-data-service:
    image: crypton-market-data-service:latest
    build:
      context: .
      dockerfile: src/Crypton.Api.MarketData/Dockerfile
    container_name: crypton-market-data-service
    ports:
      - "127.0.0.1:5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:5002
      - MARKETDATA__KRAKEN__APIKEY=${MARKETDATA__KRAKEN__APIKEY}
      - MARKETDATA__KRAKEN__APISECRET=${MARKETDATA__KRAKEN__APISECRET}
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  execution-service:
    image: crypton-execution-service:latest
    build:
      context: .
      dockerfile: src/Crypton.Api.ExecutionService/Dockerfile
    container_name: crypton-execution-service
    ports:
      - "127.0.0.1:5004:5004"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:5004
      - EXECUTIONSERVICE__KRAKEN__APIKEY=${EXECUTIONSERVICE__KRAKEN__APIKEY}
      - EXECUTIONSERVICE__KRAKEN__APISECRET=${EXECUTIONSERVICE__KRAKEN__APISECRET}
      - EXECUTIONSERVICE__API__APIKEY=${EXECUTIONSERVICE__API__APIKEY}
      # MarketDataServiceUrl tells MarketDataServiceClient where to connect for price ticks.
      - EXECUTIONSERVICE__MARKETDATASERVICEURL=http://market-data-service:5002
    volumes:
      - crypton_artifacts:/app/artifacts
      - /home/matthew-evans/.config/crypton/execution/logs:/app/logs
    depends_on:
      market-data-service:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  monitoring-dashboard-api:
    image: crypton-monitoring-dashboard-api:latest
    build:
      context: .
      dockerfile: src/Crypton.Api.MonitoringDashboard/Dockerfile
    container_name: crypton-monitoring-dashboard-api
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://0.0.0.0:5001
      - MONITORINGDASHBOARD__MARKETDATASERVICE__URL=http://market-data-service:5002
      - MONITORINGDASHBOARD__EXECUTIONSERVICE__URL=http://execution-service:5004
      - MONITORINGDASHBOARD__EXECUTIONSERVICE__APIKEY=${EXECUTIONSERVICE__API__APIKEY}
      - MONITORINGDASHBOARD__AGENTRUNNER__URL=http://agent-runner:5003
      - MONITORINGDASHBOARD__AGENTRUNNER__APIKEY=${AGENTRUNNER__API__APIKEY}
    depends_on:
      market-data-service:
        condition: service_healthy
      execution-service:
        condition: service_healthy
      agent-runner:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  monitoring-dashboard-web:
    image: crypton-monitoring-dashboard-web:latest
    build:
      context: .
      dockerfile: src/Crypton.Web.Dashboard/Dockerfile
    container_name: crypton-monitoring-dashboard-web
    ports:
      - "127.0.0.1:5000:5000"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Named volume shared between agent-runner and execution-service so strategy files
# written by the agent are immediately visible to the execution engine.
volumes:
  crypton_artifacts:
